services:
  postgres:
    image: postgres:16-alpine
    container_name: sikai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sikai
      POSTGRES_PASSWORD: sikai_dev
      POSTGRES_DB: sikai
    ports:
      - "5432:5432"
    volumes:
      - sikai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sikai -d sikai"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  sikai_pg_data:
